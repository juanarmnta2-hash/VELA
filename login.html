<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — VELA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0E17;--ink-2:#0F1522;--line:#20293C;--text:#E7E9EF;--muted:#8A93A6;--gold:#E8B04B;--gold-2:#F2C86A;--up:#4FD1A8;--down:#E06C6C;--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
  .glow{position:fixed;top:-160px;right:-120px;width:560px;height:560px;background:radial-gradient(circle,rgba(232,176,75,.12),transparent 62%);pointer-events:none}
  .card{width:100%;max-width:420px;background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:18px;padding:38px 32px;position:relative;box-shadow:0 30px 80px -30px rgba(0,0,0,.8)}
  .logo{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.14em;display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:26px}
  .logo-mark{width:13px;height:21px;border-radius:3px;background:linear-gradient(180deg,var(--gold-2),var(--gold));box-shadow:0 0 20px rgba(232,176,75,.45)}
  h1{font-family:var(--display);font-weight:600;font-size:24px;color:#fff;text-align:center;letter-spacing:-.01em}
  .sub{font-size:14.5px;color:var(--muted);text-align:center;margin:10px 0 26px}
  label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 7px;letter-spacing:.02em}
  input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:13px 15px;color:var(--text);font-family:var(--body);font-size:15px;margin-bottom:16px;transition:.2s}
  input:focus{outline:none;border-color:var(--gold)}
  .btn{width:100%;background:var(--gold);color:var(--ink);font-family:var(--body);font-weight:600;font-size:15.5px;padding:14px;border:none;border-radius:10px;cursor:pointer;transition:.2s;margin-top:4px}
  .btn:hover{background:var(--gold-2)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .switch{text-align:center;font-size:14px;color:var(--muted);margin-top:22px}
  .switch a{color:var(--gold);font-weight:600;text-decoration:none}
  .msg{font-size:13.5px;padding:12px 14px;border-radius:9px;margin-bottom:16px;display:none;line-height:1.5}
  .msg.err{display:block;background:rgba(224,108,108,.12);border:1px solid rgba(224,108,108,.3);color:#f0a0a0}
  .msg.ok{display:block;background:rgba(79,209,168,.12);border:1px solid rgba(79,209,168,.3);color:#7fe0c4}
  .back{text-align:center;margin-top:18px}
  .back a{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em;text-decoration:none}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo"><span class="logo-mark"></span>VELA</div>
  <h1>Bienvenido de vuelta</h1>
  <p class="sub">Inicia sesión para acceder a tu plataforma.</p>
  <div class="msg" id="msg"></div>
  <label>Correo electrónico</label>
  <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email">
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <button class="btn" id="btn">Iniciar sesión</button>
  <p class="switch">¿No tienes cuenta? <a href="registro.html">Crea una</a></p>
  <div class="back"><a href="index.html">← Volver al inicio</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const btn=document.getElementById('btn'), msg=document.getElementById('msg');
  function show(t,type){msg.textContent=t;msg.className='msg '+type;}
  async function entrar(){
    if(typeof sb==='undefined'||!sb){show('No se pudo conectar con Supabase. Revisa supabase-config.js y recarga la página.','err');return;}
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(!email||!password){show('Escribe tu correo y contraseña.','err');return;}
    btn.disabled=true;btn.textContent='Entrando...';
    try{
      const {data,error}=await sb.auth.signInWithPassword({email,password});
      if(error){show(traducir(error.message),'err');btn.disabled=false;btn.textContent='Iniciar sesión';return;}
      window.location.href='dashboard.html';
    }catch(e){
      show('Error de conexión: '+e.message,'err');btn.disabled=false;btn.textContent='Iniciar sesión';
    }
  }
  function traducir(m){
    if(/Invalid login/i.test(m))return'Correo o contraseña incorrectos.';
    if(/Email not confirmed/i.test(m))return'Debes confirmar tu correo antes de entrar.';
    return m;
  }
  btn.addEventListener('click',entrar);
  document.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')entrar();}));
</script>
</body>
</html>
