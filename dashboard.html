<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi plataforma — VELA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0E17;--ink-2:#0F1522;--ink-3:#161F31;--line:#20293C;--text:#E7E9EF;--muted:#8A93A6;--gold:#E8B04B;--gold-2:#F2C86A;--up:#4FD1A8;--down:#E06C6C;--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--text);font-family:var(--body);min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--line);background:rgba(10,14,23,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
  .logo{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:.14em;display:flex;align-items:center;gap:9px}
  .logo-mark{width:12px;height:19px;border-radius:3px;background:linear-gradient(180deg,var(--gold-2),var(--gold));box-shadow:0 0 18px rgba(232,176,75,.45)}
  .top-right{display:flex;align-items:center;gap:16px}
  .who{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .logout{font-family:var(--body);font-size:13.5px;font-weight:600;color:var(--text);background:transparent;border:1px solid var(--line);padding:8px 16px;border-radius:8px;cursor:pointer;transition:.2s}
  .logout:hover{border-color:var(--down);color:var(--down)}
  .wrap{max-width:1100px;margin:0 auto;padding:40px 28px}
  .hello{font-family:var(--display);font-weight:600;font-size:clamp(24px,4vw,32px);color:#fff;letter-spacing:-.01em}
  .hello span{color:var(--gold)}
  .balance-card{background:linear-gradient(160deg,var(--ink-3),var(--ink-2));border:1px solid var(--line);border-radius:16px;padding:26px 28px;position:relative;overflow:hidden;margin-top:30px}
  .card-label{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .balance{font-family:var(--mono);font-weight:600;font-size:clamp(30px,5vw,42px);color:#fff;margin-top:10px}
  .balance small{font-size:20px;color:var(--muted)}
  .balance-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;position:relative}
  .balance-tag{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:11.5px;color:var(--gold);border:1px solid rgba(232,176,75,.3);padding:5px 11px;border-radius:100px}
  .actions-group { display:flex; gap:12px; flex-wrap:wrap; margin-top:14px; }
  .dep-btn{background:var(--gold);color:var(--ink);font-family:var(--body);font-weight:600;font-size:14.5px;padding:12px 24px;border:none;border-radius:10px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(232,176,75,.22)}
  .dep-btn:hover{background:var(--gold-2);transform:translateY(-1px)}
  .wth-btn{background:transparent;color:var(--text);font-family:var(--body);font-weight:600;font-size:14.5px;padding:12px 24px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px;}
  .wth-btn:hover{border-color:var(--down);color:var(--down);transform:translateY(-1px)}

  .markets{margin-top:38px}
  .mk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .mk-title{font-family:var(--display);font-weight:600;font-size:20px;color:#fff}
  .table{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--ink-2)}
  .row{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line);transition:background .15s}
  .row:last-child{border-bottom:none}
  .row.head{background:var(--ink-3);padding:12px 22px}
  .row.head span{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .row.data{cursor:pointer}
  .row.data:hover{background:var(--ink-3)}
  .asset{display:flex;flex-direction:column;gap:3px}
  .asset .sym{font-family:var(--display);font-weight:600;font-size:16px;color:#fff}
  .asset .name{font-size:12.5px;color:var(--muted)}
  .rowend{display:flex;align-items:center;gap:14px}
  .right{text-align:right;display:flex;flex-direction:column;gap:3px;min-width:120px}
  .price{font-family:var(--mono);font-weight:600;font-size:16px;color:var(--text)}
  .chg{font-family:var(--mono);font-size:12.5px}
  .chg.up{color:var(--up)}
  .chg.down{color:var(--down)}

  .pos-close-btn { background:transparent; border:1px solid var(--line); color:var(--text); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; transition:.2s; }
  .pos-close-btn:hover { border-color:var(--down); background:var(--down); color:#fff; }
  
  .modal{position:fixed;inset:0;background:rgba(5,8,14,.85);backdrop-filter:blur(8px);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-box{width:100%;max-width:1100px;height:85vh;background:var(--ink-2);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px -30px rgba(0,0,0,.9)}
  
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line);background:var(--ink-3);flex-wrap:wrap;gap:16px}
  .m-left{display:flex;align-items:center;gap:24px;flex-wrap:wrap;flex:1}
  .m-info { display:flex; flex-direction:column; gap:2px }
  .m-sym{font-family:var(--display);font-weight:700;font-size:22px;color:#fff}
  .m-name{font-size:13px;color:var(--muted)}
  .m-price-live{font-family:var(--mono); font-size:22px; font-weight:600; color:var(--gold); min-width:120px}
  
  .trade-panel { display:flex; align-items:center; gap:12px; background:var(--ink); padding:6px 14px; border-radius:8px; border:1px solid var(--line); }
  .trade-input { background:var(--ink-2); border:1px solid var(--line); color:#fff; padding:8px 12px; border-radius:6px; width:110px; font-family:var(--mono); font-size:14px; outline:none; text-align:center; }
  .trade-input:focus { border-color:var(--gold); }
  .btn-buy { background:var(--up); color:var(--ink); border:none; padding:9px 18px; border-radius:6px; font-weight:600; font-size:13.5px; cursor:pointer; transition:.2s; }
  .btn-buy:hover { opacity:0.9; transform:translateY(-1px); }
  .btn-sell { background:var(--down); color:#fff; border:none; padding:9px 18px; border-radius:6px; font-weight:600; font-size:13.5px; cursor:pointer; transition:.2s; }
  .btn-sell:hover { opacity:0.9; transform:translateY(-1px); }

  .m-close{background:transparent;border:1px solid var(--line);color:var(--text);width:38px;height:38px;border-radius:8px;cursor:pointer;font-size:16px;transition:.2s;display:flex;align-items:center;justify-content:center}
  .m-close:hover{border-color:var(--down);color:var(--down)}
  .tv-wrap{flex:1;min-height:0;background:var(--ink)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="logo-mark"></span>VELA</div>
  <div class="top-right">
    <span class="who" id="email">—</span>
    <button class="logout" id="logout">Cerrar sesión</button>
  </div>
</div>

<div class="wrap">
  <h1 class="hello">Hola, <span id="hello">—</span></h1>

  <div class="balance-card">
    <div class="card-label">Saldo de cuenta</div>
    <div class="balance-row">
      <div>
        <div class="balance" id="balance">Cargando...</div>
        <span class="balance-tag">Fondos unificados listos para operar</span>
      </div>
      <div class="actions-group">
        <button class="dep-btn" id="open-deposit">＋ Depositar</button>
        <button class="wth-btn" id="open-withdraw">－ Retirar</button>
      </div>
    </div>
  </div>

  <div class="markets" id="positions-container" style="display:none;">
    <div class="mk-head">
      <div class="mk-title">Posiciones Abiertas</div>
    </div>
    <div class="table" id="positions-table"></div>
  </div>

  <div class="markets">
    <div class="mk-head">
      <div class="mk-title">Mercados</div>
    </div>
    <div class="table" id="table">
      <div class="row head"><span>Activo</span><span>Precio / Variación</span></div>
      <div class="row"><div style="padding:20px;color:var(--muted);font-size:14px;">Cargando mercados...</div></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="m-left">
        <div class="m-info">
            <span class="m-sym" id="m-sym">—</span>
            <span class="m-name" id="m-name">—</span>
        </div>
        <div class="m-price-live" id="m-price-live">$0.00</div>
        
        <div class="trade-panel">
            <span style="font-size:12.5px; color:var(--muted); font-weight:500">Inversión USD:</span>
            <input type="number" id="trade-amount" class="trade-input" value="100" min="10">
            <button class="btn-buy" id="btn-buy">BUY (Long)</button>
            <button class="btn-sell" id="btn-sell">SELL (Short)</button>
        </div>
      </div>
      <button class="m-close" id="m-close">✕</button>
    </div>
    <div class="tv-wrap">
      <div class="tradingview-widget-container" id="tv_chart" style="width:100%;height:100%"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  let balance = 0;
  let userEmail = '';
  let userId = '';
  let currentModalPrice = 0;
  let currentModalSymbol = '';

  const FINNHUB_KEY = "d94p3e9r01qq8ms5kd90d94p3e9r01qq8ms5kd9g";
  const SYMBOLS = [
    ["AAPL","Apple Inc.","NASDAQ:AAPL"],["MSFT","Microsoft","NASDAQ:MSFT"],
    ["NVDA","NVIDIA","NASDAQ:NVDA"],["TSLA","Tesla","NASDAQ:TSLA"],
    ["AMZN","Amazon","NASDAQ:AMZN"],["META","Meta Platforms","NASDAQ:META"],
    ["GOOGL","Alphabet","NASDAQ:GOOGL"],["AMD","Advanced Micro Devices","NASDAQ:AMD"]
  ];

  (async()=>{
    if(typeof sb==='undefined'||!sb){ return; }
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ window.location.href='login.html'; return; }
    const user = session.user;
    userEmail = user.email;
    userId = user.id;
    
    document.getElementById('hello').textContent = (user.user_metadata && user.user_metadata.full_name) || user.email.split('@')[0];
    document.getElementById('email').textContent = user.email;

    const { data: portfolioData } = await sb.from('user_portfolios').select('balance').eq('user_id', userId).single();

    if (portfolioData) {
      balance = Number(portfolioData.balance);
    } else {
      balance = 0;
      await sb.from('user_portfolios').insert([{ user_id: userId, balance: 0 }]);
    }
    renderBalance();
    loadPositions();
  })();
  
  document.getElementById('logout').addEventListener('click', async ()=>{
    if(sb){ await sb.auth.signOut(); }
    window.location.href='index.html';
  });

  function renderBalance(){
    const s = Number(balance).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
    const p = s.split('.');
    document.getElementById('balance').innerHTML = '$'+p[0]+'<small>.'+p[1]+'</small>';
  }

  // LOGICA PARA ENVIAR SOLICITUD DE DEPOSITO AL ADMIN
  document.getElementById('open-deposit').addEventListener('click', async () => {
    const valor = prompt('¿Cuánto deseas DEPOSITAR en USD?');
    if (!valor || isNaN(valor) || Number(valor) <= 0) return;
    
    const { error } = await sb.from('solicitudes').insert([{
        email: userEmail,
        monto: Number(valor),
        tipo: 'deposito',
        status: 'pendiente'
    }]);

    if (error) {
        alert('Error al enviar la solicitud de depósito. Intenta de nuevo.');
        console.error(error);
    } else {
        alert('✅ Solicitud de depósito enviada. En espera de aprobación por el Centro de Mando.');
    }
  });

  // LOGICA PARA ENVIAR SOLICITUD DE RETIRO AL ADMIN
  document.getElementById('open-withdraw').addEventListener('click', async () => {
    const valor = prompt('¿Cuánto deseas RETIRAR en USD?');
    if (!valor || isNaN(valor) || Number(valor) <= 0) return;
    
    if (Number(valor) > balance) {
        return alert('Saldo insuficiente para realizar este retiro.');
    }

    const { error } = await sb.from('solicitudes').insert([{
        email: userEmail,
        monto: Number(valor),
        tipo: 'retiro',
        status: 'pendiente'
    }]);

    if (error) {
        alert('Error al enviar la solicitud de retiro. Intenta de nuevo.');
    } else {
        alert('✅ Solicitud de retiro enviada. En espera de aprobación por el Centro de Mando.');
    }
  });

  async function executeTrade(type) {
    const amount = Number(document.getElementById('trade-amount').value);
    if(amount <= 0 || isNaN(amount)) return alert('Ingresa un monto válido de inversión.');
    if(amount > balance) return alert('Saldo insuficiente en tu cuenta.');
    if(currentModalPrice <= 0) return alert('Sincronizando cotización de mercado en tiempo real...');

    const btn = type === 'BUY' ? document.getElementById('btn-buy') : document.getElementById('btn-sell');
    btn.disabled = true;

    balance -= amount;
    renderBalance();

    const { error: tradeError } = await sb.from('trades').insert([{
        user_id: userId,
        symbol: currentModalSymbol,
        trade_type: type,
        entry_price: currentModalPrice,
        amount: amount,
        status: 'OPEN'
    }]);

    await sb.from('user_portfolios').update({ balance: balance }).eq('user_id', userId);
    btn.disabled = false;
    
    if(tradeError) {
        alert('Error operativo al registrar la orden.');
        console.error(tradeError);
    } else {
        alert(`Posición ejecutada: ${type} en ${currentModalSymbol} por $${amount} USD.`);
        closeChart();
        loadPositions();
    }
  }

  document.getElementById('btn-buy').onclick = () => executeTrade('BUY');
  document.getElementById('btn-sell').onclick = () => executeTrade('SELL');

  async function loadPositions() {
    const { data: trades } = await sb
        .from('trades')
        .select('*')
        .eq('user_id', userId)
        .eq('status', 'OPEN');

    const container = document.getElementById('positions-container');
    const table = document.getElementById('positions-table');
    
    if(!trades || trades.length === 0) {
        container.style.display = 'none';
        return;
    }

    container.style.display = 'block';
    let html = '<div class="row head"><span>Activo / Dirección</span><span>Inversión / Entrada</span><span>Acción</span></div>';
    
    trades.forEach(trade => {
        const color = trade.trade_type === 'BUY' ? 'var(--up)' : 'var(--down)';
        html += `
        <div class="row data" style="cursor:default">
            <div class="asset">
                <span class="sym">${trade.symbol}</span>
                <span class="name" style="color:${color}; font-weight:600; letter-spacing:0.05em">${trade.trade_type}</span>
            </div>
            <div class="right" style="text-align:left">
                <span class="price">$${trade.amount.toLocaleString('es-MX')} USD</span>
                <span class="chg" style="color:var(--muted)">Entrada: $${trade.entry_price}</span>
            </div>
            <div>
                <button class="pos-close-btn" onclick="closeTrade('${trade.id}', '${trade.symbol}', '${trade.trade_type}', ${trade.entry_price}, ${trade.amount})">Cerrar Operación</button>
            </div>
        </div>`;
    });
    table.innerHTML = html;
  }

  async function closeTrade(tradeId, symbol, type, entryPrice, amount) {
    try {
        const res = await fetch("https://finnhub.io/api/v1/quote?symbol="+symbol+"&token="+FINNHUB_KEY);
        const q = await res.json();
        const closePrice = q.c;
        
        if(!closePrice || closePrice === 0) return alert('Error al obtener precio de liquidación.');

        const priceDiff = closePrice - entryPrice;
        const percentChange = priceDiff / entryPrice;
        
        let pnl = 0;
        if(type === 'BUY') {
            pnl = amount * percentChange;
        } else {
            pnl = amount * -percentChange;
        }

        const montoRecuperado = amount + pnl;
        balance += montoRecuperado;
        renderBalance();

        await sb.from('trades').update({
            status: 'CLOSED',
            close_price: closePrice,
            pnl: pnl
        }).eq('id', tradeId);

        await sb.from('user_portfolios').update({ balance: balance }).eq('user_id', userId);

        alert(`Liquidación completada.\nPrecio Cierre: $${closePrice}\nRetorno Neto: $${montoRecuperado.toFixed(2)} USD`);
        loadPositions();
    } catch(e) {
        alert('Fallo de conexión al liquidar la operación.');
    }
  }

  function fmt(n){ return Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  async function fetchQuote(sym){
    const r = await fetch("https://finnhub.io/api/v1/quote?symbol="+sym+"&token="+FINNHUB_KEY);
    return r.json();
  }
  
  function render(rows){
    let html = '<div class="row head"><span>Activo</span><span>Precio / Variación</span></div>';
    for(const {sym,name,tv,q} of rows){
      if(!q || (q.c===0 && q.pc===0)) continue;
      const dp = q.dp==null?0:q.dp, d = q.d==null?0:q.d;
      const up = dp >= 0, arrow = up?'▲':'▼', cls = up?'up':'down';
      html += `<div class="row data" onclick="openChart('${sym}','${name}','${tv}', ${q.c})">
                <div class="asset"><span class="sym">${sym}</span><span class="name">${name}</span></div>
                <div class="rowend">
                    <div class="right">
                        <span class="price">$${fmt(q.c)}</span>
                        <span class="chg ${cls}">${arrow} ${fmt(Math.abs(d))} (${(up?'+':'')}${fmt(dp)}%)</span>
                    </div>
                    <span class="chev">›</span>
                </div>
               </div>`;
    }
    document.getElementById('table').innerHTML = html;
  }
  
  async function loadMarkets(){
    try{
      const rows = await Promise.all(SYMBOLS.map(async t => {
        try{ const q = await fetchQuote(t[0]); return {sym:t[0],name:t[1],tv:t[2],q:q}; }
        catch(e){ return {sym:t[0],name:t[1],tv:t[2],q:null}; }
      }));
      render(rows);
    }catch(e){}
  }
  loadMarkets();
  setInterval(loadMarkets, 25000);

  function openChart(sym, name, tv, currentPrice){
    currentModalSymbol = sym;
    currentModalPrice = currentPrice;

    document.getElementById('m-sym').textContent = sym;
    document.getElementById('m-name').textContent = name;
    document.getElementById('m-price-live').textContent = '$' + fmt(currentPrice);
    
    document.getElementById('modal').classList.add('open');
    const container = document.getElementById('tv_chart');
    container.innerHTML = '';
    const s = document.createElement('script');
    s.type = 'text/javascript';
    s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    s.async = true;
    s.innerHTML = JSON.stringify({
      autosize:true, symbol:tv, interval:'15', timezone:'America/Mexico_City',
      theme:'dark', style:'1', locale:'es', hide_side_toolbar:false,
      allow_symbol_change:false, backgroundColor:'#0A0E17', gridColor:'rgba(32,41,60,0.5)'
    });
    container.appendChild(s);
  }
  
  function closeChart(){
    document.getElementById('modal').classList.remove('open');
    document.getElementById('tv_chart').innerHTML='';
  }
  document.getElementById('m-close').addEventListener('click', closeChart);
</script>
</body>
</html>
