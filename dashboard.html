<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — VELA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0A0E17;
    --ink-2: #0F1522;
    --ink-3: #161F31;
    --line: #20293C;
    --text: #E7E9EF;
    --muted: #8A93A6;
    --gold: #E8B04B;
    --gold-2: #F2C86A;
    --down: #E06C6C;
    --up: #4FD1A8;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--ink); color: var(--text); font-family: var(--body); min-height: 100vh; padding: 32px; }
  
  /* Contenedor Principal */
  .container { max-width: 1000px; margin: 0 auto; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .brand { font-family: var(--display); font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .user-badge { font-family: var(--mono); font-size: 13px; color: var(--gold); background: var(--ink-2); padding: 6px 14px; border: 1px solid var(--line); border-radius: 20px; }
  
  /* Tarjeta de Balance */
  .balance-card { background: linear-gradient(135deg, var(--ink-2), var(--ink-3)); border: 1px solid var(--line); border-radius: 16px; padding: 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
  .bal-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .bal-val { font-family: var(--mono); font-size: 36px; font-weight: 600; color: #fff; }
  .action-btn { background: var(--gold); color: var(--ink); font-family: var(--body); font-weight: 600; font-size: 14.5px; padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer; transition: .2s; }
  .action-btn:hover { background: var(--gold-2); transform: translateY(-1px); }

  /* Estructura de Modales */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,8,13,0.85); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
  .dbox { width: 100%; max-width: 440px; background: linear-gradient(180deg, var(--ink-2), var(--ink)); border: 1px solid var(--line); border-radius: 20px; padding: 32px; box-shadow: 0 40px 100px rgba(0,0,0,0.7); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .m-title { font-family: var(--display); font-size: 20px; font-weight: 600; color: #fff; }
  .m-close { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .m-close:hover { color: #fff; }

  /* Elementos de la Pasarela de Pago */
  .dlabel { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
  .damount { display: flex; align-items: center; background: var(--ink); border: 1px solid var(--line); border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; }
  .damount input { width: 100%; background: transparent; border: none; color: #fff; font-family: var(--mono); font-size: 24px; outline: none; padding-left: 8px; }
  .dcur { font-size: 22px; color: var(--muted); font-family: var(--mono); }
  
  .gw-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
  .gw-tab { flex: 1; padding: 10px; text-align: center; font-family: var(--body); font-weight: 600; font-size: 13px; color: var(--muted); background: transparent; border: 1px solid transparent; border-radius: 8px; cursor: pointer; transition: .2s; }
  .gw-tab.active { background: var(--ink-3); color: var(--text); border-color: var(--line); }
  
  .gw-form { display: none; flex-direction: column; gap: 14px; }
  .gw-form.active { display: flex; }
  .gw-input { width: 100%; background: var(--ink); border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px; color: var(--text); font-family: var(--body); font-size: 14.5px; transition: .2s; }
  .gw-input:focus { outline: none; border-color: var(--gold); }
  .gw-row { display: flex; gap: 10px; }
  
  .gw-check { display: flex; align-items: flex-start; gap: 10px; margin: 6px 0; cursor: pointer; }
  .gw-check input { margin-top: 3px; accent-color: var(--gold); }
  .gw-check span { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .gw-check a { color: var(--gold); text-decoration: none; }
  
  .spei-box { background: var(--ink-3); border: 1px dashed var(--line); border-radius: 10px; padding: 18px; text-align: center; margin-bottom: 4px; }
  .spei-clabe { font-family: var(--mono); font-size: 18px; color: var(--up); font-weight: 600; margin: 10px 0; letter-spacing: 1.5px; }
  .dbtn { width: 100%; background: var(--gold); color: var(--ink); font-family: var(--body); font-weight: 600; font-size: 15px; padding: 14px; border: none; border-radius: 10px; cursor: pointer; transition: .2s; margin-top: 10px; }
  .dbtn:hover { background: var(--gold-2); }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <div class="brand">VELA // PLATFORM</div>
    <div class="user-badge" id="user-display">Cargando inversionista...</div>
  </div>

  <div class="balance-card">
    <div>
      <div class="bal-label">Balance Disponible de Práctica</div>
      <div class="bal-val" id="balance-display">$0.00</div>
    </div>
    <button class="action-btn" id="open-deposit-btn">Depositar Fondos</button>
  </div>
</div>

<div class="modal" id="deposit-modal">
  <div class="dbox">
    <div class="modal-head">
      <div class="m-title">Pasarela de Fondos</div>
      <button class="m-close" id="close-deposit-btn">✕</button>
    </div>
    
    <label class="dlabel">Monto a depositar (MXN)</label>
    <div class="damount">
      <span class="dcur">$</span>
      <input id="d-input" type="number" placeholder="10,000" min="100">
    </div>
    
    <div class="gw-tabs">
      <button class="gw-tab active" id="tab-card">Tarjeta Crédito / Débito</button>
      <button class="gw-tab" id="tab-spei">SPEI Bancario</button>
    </div>

    <div class="gw-form active" id="form-card">
      <input type="text" class="gw-input" placeholder="Nombre impreso en tarjeta">
      <input type="text" class="gw-input" placeholder="4152 0012 3456 7890" maxlength="19">
      <div class="gw-row">
        <input type="text" class="gw-input" placeholder="MM/AA" maxlength="5">
        <input type="text" class="gw-input" placeholder="CVV" maxlength="3">
      </div>
      <label class="gw-check">
        <input type="checkbox" id="chk-tc">
        <span>Acepto los <a href="#">Términos de Uso</a> y confirmo el procesamiento mediante los servidores cifrados de Stripe.</span>
      </label>
      <button class="dbtn" id="btn-submit-card">Procesar Pago Seguro</button>
    </div>

    <div class="gw-form" id="form-spei">
      <div class="spei-box">
        <div style="font-size:12px; color:var(--muted)">Institución Receptora: STP / VELA</div>
        <div class="spei-clabe">6461 8011 2233 4455 66</div>
        <div style="font-size:12px; color:var(--muted)">Concepto: Fondeo Interno <span id="spei-user" style="color:var(--text); font-weight:600;"></span></div>
      </div>
      <label class="gw-check">
        <input type="checkbox" id="chk-spei">
        <span>Declaro haber ejecutado con éxito la transferencia interbancaria desde mi aplicación móvil.</span>
      </label>
      <button class="dbtn" id="btn-submit-spei">Notificar Envío a Validación</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  // Cuenta simulada para pruebas locales
  const userEmail = "inversionista.demo@vela.com";

  // Inicialización de Pantalla
  document.getElementById('user-display').textContent = userEmail;

  // Cargar balance financiero desde Supabase
  async function sincronizarBalance() {
    const { data, error } = await sb.from('perfiles').select('balance').eq('email', userEmail).single();
    if (data) {
      document.getElementById('balance-display').textContent = `$${Number(data.balance).toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
    }
  }

  // Comportamiento del Modal
  const modal = document.getElementById('deposit-modal');
  document.getElementById('open-deposit-btn').onclick = () => { modal.style.display = 'flex'; };
  document.getElementById('close-deposit-btn').onclick = () => { modal.style.display = 'none'; };

  // Intercambio de Pestañas
  const tabCard = document.getElementById('tab-card');
  const tabSpei = document.getElementById('tab-spei');
  const formCard = document.getElementById('form-card');
  const formSpei = document.getElementById('form-spei');

  tabCard.onclick = () => { tabCard.classList.add('active'); tabSpei.classList.remove('active'); formCard.classList.add('active'); formSpei.classList.remove('active'); }
  tabSpei.onclick = () => { tabSpei.classList.add('active'); tabCard.classList.remove('active'); formSpei.classList.add('active'); formCard.classList.remove('active'); document.getElementById('spei-user').textContent = userEmail.split('@')[0].toUpperCase(); }

  // Envío de Solicitud de Fondeo Controlada
  async function enviarNotificacionFondeo(metodo) {
    const monto = Number(document.getElementById('d-input').value);
    if (!monto || monto < 100) { alert("Ingresa un monto válido igual o mayor a $100."); return; }

    if (metodo === 'card' && !document.getElementById('chk-tc').checked) { alert("Debes aceptar los términos de procesamiento."); return; }
    if (metodo === 'spei' && !document.getElementById('chk-spei').checked) { alert("Debes confirmar la transferencia de fondos."); return; }

    const btn = metodo === 'card' ? document.getElementById('btn-submit-card') : document.getElementById('btn-submit-spei');
    btn.disabled = true;
    btn.textContent = 'Estableciendo cifrado SSL...';

    // Guardar fila limpia en la tabla de solicitudes sin tocar el balance del usuario
    const { error } = await sb.from('solicitudes').insert([
      { email: userEmail, monto: monto, tipo: 'deposito', status: 'pendiente' }
    ]);

    if (error) {
      alert("Error de respuesta de la red bancaria. Intenta de nuevo.");
    } else {
      alert("Transacción enviada a validación. Sus fondos se verán reflejados en el tablero una vez aprobados por mesa de control.");
      modal.style.display = 'none';
      document.getElementById('d-input').value = '';
    }
    btn.disabled = false;
    btn.textContent = metodo === 'card' ? 'Procesar Pago Seguro' : 'Notificar Envío a Validación';
  }

  document.getElementById('btn-submit-card').onclick = () => enviarNotificacionFondeo('card');
  document.getElementById('btn-submit-spei').onclick = () => enviarNotificacionFondeo('spei');

  // Carga Inicial
  if(typeof sb !== 'undefined'){
    sincronizarBalance();
    setInterval(sincronizarBalance, 6000); // Monitoreo en background por si el administrador aprueba
  }
</script>
</body>
</html>
