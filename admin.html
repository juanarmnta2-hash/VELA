<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Comando — VELA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0E17;--ink-2:#0F1522;--ink-3:#161F31;--line:#20293C;--text:#E7E9EF;--muted:#8A93A6;--gold:#E8B04B;--gold-2:#F2C86A;--down:#E06C6C;--up:#4FD1A8;--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--text);font-family:var(--body);min-height:100vh;padding:40px 24px}
  .header{text-align:center;margin-bottom:40px}
  h1{font-family:var(--display);font-weight:600;font-size:28px;color:#fff;letter-spacing:-.01em}
  .sub{font-size:14px;color:var(--muted);margin-top:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));gap:24px;max-width:1200px;margin:0 auto}
  .card{background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:18px;padding:32px;box-shadow:0 30px 80px -30px rgba(0,0,0,.8)}
  h2{font-family:var(--display);font-size:18px;color:var(--gold);margin-bottom:24px;border-bottom:1px solid var(--line);padding-bottom:12px}
  label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 7px;letter-spacing:.02em}
  input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:13px 15px;color:var(--text);font-family:var(--body);font-size:15px;margin-bottom:16px;transition:.2s}
  input:focus{outline:none;border-color:var(--gold)}
  .btn{width:100%;background:var(--gold);color:var(--ink);font-family:var(--body);font-weight:600;font-size:14.5px;padding:12px;border:none;border-radius:10px;cursor:pointer;transition:.2s}
  .btn:hover{background:var(--gold-2)}
  .btn-sm{padding:8px 12px;font-size:12.5px;border-radius:6px;width:auto}
  .btn-green{background:var(--up);color:var(--ink)}
  .btn-red{background:transparent;border:1px solid var(--down);color:var(--down)}
  .msg{font-size:13.5px;padding:12px 14px;border-radius:9px;margin-top:16px;display:none;line-height:1.5;text-align:center}
  .msg.err{display:block;background:rgba(224,108,108,.12);border:1px solid rgba(224,108,108,.3);color:#f0a0a0}
  .msg.ok{display:block;background:rgba(79,209,168,.12);border:1px solid rgba(79,209,168,.3);color:#7fe0c4}
  .list-item{background:var(--ink-3);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .list-info{font-size:13.5px}
  .list-info strong{color:#fff;font-family:var(--mono);font-size:15px;display:block;margin-bottom:4px}
  .empty{font-size:13.5px;color:var(--muted);text-align:center;padding:20px;font-style:italic}
</style>
</head>
<body>

<div class="header">
  <h1>⚙️ Centro de Comando VELA</h1>
  <p class="sub">Administración de fondos, solicitudes y operativas</p>
</div>

<div class="grid">
  <!-- 1. SOLICITUDES -->
  <div class="card">
    <h2>📥 Solicitudes Pendientes</h2>
    <div id="solicitudes-list">
      <div class="empty">Cargando solicitudes...</div>
    </div>
  </div>

  <!-- 2. CONTROL MANUAL POR CORREO -->
  <div class="card">
    <h2>⚡ Ajuste Manual de Saldo</h2>
    <label>Correo del usuario</label>
    <input type="email" id="email" placeholder="cliente@ejemplo.com">
    <label>Nuevo saldo total exacto ($)</label>
    <input type="number" id="saldo" placeholder="Ej. 150000">
    <button class="btn" id="btn-manual">Sobrescribir Saldo</button>
    <div class="msg" id="msg-manual"></div>
  </div>

  <!-- 3. OPERACIONES ACTIVAS DE TRADING -->
  <div class="card">
    <h2>📈 Operaciones Activas</h2>
    <div id="operaciones-list">
      <div class="empty">Cargando operaciones del mercado...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  
  // 1. CARGAR SOLICITUDES PENDIENTES
  async function cargarSolicitudes() {
    const list = document.getElementById('solicitudes-list');
    const { data, error } = await sb.from('solicitudes').select('*').eq('status', 'pendiente').order('created_at', { ascending: false });
    
    if(error || !data || data.length === 0){
      list.innerHTML = '<div class="empty">No hay solicitudes pendientes.</div>';
      return;
    }

    list.innerHTML = '';
    data.forEach(req => {
      const isRetiro = (req.tipo || '').toLowerCase() === 'retiro';
      const colorTipo = isRetiro ? 'var(--down)' : 'var(--up)';
      
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `
        <div class="list-info">
          <strong>$${req.monto.toLocaleString('es-MX')}</strong>
          <span style="color:var(--muted)">${req.email}</span><br>
          <span style="font-size:11px;color:${colorTipo};text-transform:uppercase;border:1px solid ${colorTipo};padding:2px 4px;border-radius:4px;display:inline-block;margin-top:4px">${req.tipo}</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-green" onclick="aprobar(${req.id}, '${req.email}', ${req.monto}, '${req.tipo}')">Aprobar</button>
          <button class="btn btn-sm btn-red" onclick="rechazar(${req.id})">Rechazar</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  // 2. APROBAR SOLICITUD (Suma si es depósito, Resta si es retiro)
  async function aprobar(id, email, monto, tipo) {
    const { data: perfil, error: errPerfil } = await sb.from('perfiles').select('id').eq('email', email).single();
    
    if (errPerfil || !perfil) {
      alert(`Error: No se encontró el registro de cuenta para el correo ${email}.`);
      return;
    }
    
    const userId = perfil.id;

    // Buscar balance actual
    const { data: portfolio } = await sb.from('user_portfolios').select('balance').eq('user_id', userId).single();
    const saldoActual = portfolio ? Number(portfolio.balance) : 0;
    
    // Lógica matemática
    let nuevoSaldo = saldoActual;
    const tipoNormalizado = (tipo || 'deposito').toLowerCase();

    if (tipoNormalizado === 'retiro') {
        if (saldoActual < monto) {
            alert(`ATENCIÓN: El usuario solo tiene $${saldoActual}. No se le puede retirar $${monto}.`);
            return;
        }
        nuevoSaldo = saldoActual - monto;
    } else {
        nuevoSaldo = saldoActual + monto;
    }

    // Actualizar o insertar según exista el portfolio
    if (portfolio) {
        await sb.from('user_portfolios').update({ balance: nuevoSaldo }).eq('user_id', userId);
    } else {
        await sb.from('user_portfolios').insert([{ user_id: userId, balance: nuevoSaldo }]);
    }
    
    await sb.from('solicitudes').update({ status: 'aprobado' }).eq('id', id);
    
    cargarSolicitudes();
    alert(`✅ ${tipoNormalizado.toUpperCase()} de $${monto} aprobado para ${email}`);
  }

  // 3. RECHAZAR SOLICITUD
  async function rechazar(id) {
    if(confirm("¿Seguro que deseas rechazar esta solicitud?")){
      await sb.from('solicitudes').update({ status: 'rechazado' }).eq('id', id);
      cargarSolicitudes();
    }
  }

  // 4. AJUSTE MANUAL DIRECTO BUSCANDO POR CORREO (Reparado para evitar errores de llave primaria)
  const btnManual = document.getElementById('btn-manual');
  const msgManual = document.getElementById('msg-manual');
  function showMsg(t, type){ msgManual.textContent = t; msgManual.className = 'msg ' + type; }

  btnManual.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const saldo = Number(document.getElementById('saldo').value);

    if(!email || saldo < 0 || isNaN(saldo)){ showMsg('Datos inválidos.', 'err'); return; }

    btnManual.disabled = true;
    btnManual.textContent = 'Buscando perfil...';

    // 1. Encontrar ID
    const { data: perfil, error: errPerfil } = await sb.from('perfiles').select('id').eq('email', email).single();
    if (errPerfil || !perfil) {
      showMsg('No se localizó ningún perfil con ese correo.', 'err');
      btnManual.disabled = false;
      btnManual.textContent = 'Sobrescribir Saldo';
      return;
    }
    const userId = perfil.id;

    // 2. Verificar si ya tiene tabla de portafolio creada
    const { data: portfolio } = await sb.from('user_portfolios').select('id').eq('user_id', userId).single();
    
    let resError = null;
    if (portfolio) {
        const { error } = await sb.from('user_portfolios').update({ balance: saldo }).eq('user_id', userId);
        resError = error;
    } else {
        const { error } = await sb.from('user_portfolios').insert([{ user_id: userId, balance: saldo }]);
        resError = error;
    }

    if (resError) {
      showMsg('Error en la base de datos: ' + resError.message, 'err');
    } else {
      showMsg('✅ Balance de portafolio sobrescrito exitosamente.', 'ok');
      document.getElementById('email').value = '';
      document.getElementById('saldo').value = '';
    }
    
    btnManual.disabled = false;
    btnManual.textContent = 'Sobrescribir Saldo';
  });

  // 5. CARGAR OPERACIONES ACTIVAS EN VIVO DEL MOTOR DE TRADING
  async function cargarOperaciones() {
    const list = document.getElementById('operaciones-list');
    const { data, error } = await sb.from('trades').select('*').eq('status', 'OPEN').order('created_at', { ascending: false });
    
    if(error || !data || data.length === 0){
      list.innerHTML = '<div class="empty">No hay operaciones de trading abiertas en este momento.</div>';
      return;
    }

    list.innerHTML = '';
    data.forEach(op => {
      const colorTipo = op.trade_type === 'BUY' ? 'var(--up)' : 'var(--down)';
      const div = document.createElement('div');
      div.className = 'list-item';
      
      div.innerHTML = `
        <div class="list-info">
          <strong>${op.symbol} <span style="font-size:11px;color:${colorTipo};border:1px solid ${colorTipo};padding:2px 6px;border-radius:4px;margin-left:4px">${op.trade_type}</span></strong>
          <span style="color:var(--muted); font-size:11px; font-family:var(--mono)">UID: ${op.user_id.substring(0,13)}...</span><br>
          <span style="font-size:12px;color:var(--gold);">Entrada: $${op.entry_price} | Inversión: $${op.amount}</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" style="background:var(--ink-2);border:1px solid var(--gold);color:var(--gold)" 
                  onclick="alterarPrecio('${op.id}', '${op.symbol}', ${op.entry_price})">
            Manipular Entrada
          </button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  // 6. ALTERACIÓN DIRECTA DE PRECIO DE ENTRADA
  async function alterarPrecio(tradeId, symbol, currentPrice) {
    const nuevoPrecio = prompt(`Vas a alterar el precio de entrada para la operación en ${symbol}.\nPrecio actual registrado: $${currentPrice}\n\nIngresa el NUEVO precio de entrada para generar P&L forzado:`);
    
    if (!nuevoPrecio || isNaN(nuevoPrecio)) return;

    const { error } = await sb
      .from('trades')
      .update({ entry_price: parseFloat(nuevoPrecio) })
      .eq('id', tradeId);

    if (error) {
      alert('Error de actualización: ' + error.message);
    } else {
      alert(`¡Modificación exitosa! El precio cambió a $${nuevoPrecio}.`);
      cargarOperaciones();
    }
  }

  // 7. AUTO-REFRESH SÍNCRONO
  if(typeof sb !== 'undefined'){
    cargarSolicitudes();
    cargarOperaciones();
    
    setInterval(() => {
      cargarSolicitudes();
      cargarOperaciones();
    }, 12000); 
  }
</script>
</body>
</html>
