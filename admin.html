<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — VELA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0E17;--ink-2:#0F1522;--line:#20293C;--text:#E7E9EF;--muted:#8A93A6;--gold:#E8B04B;--gold-2:#F2C86A;--down:#E06C6C;--up:#4FD1A8;--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:430px;background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:18px;padding:38px 32px;box-shadow:0 30px 80px -30px rgba(0,0,0,.8)}
  h1{font-family:var(--display);font-weight:600;font-size:24px;color:#fff;text-align:center;margin-bottom:8px}
  .sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:26px}
  label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 7px;letter-spacing:.02em}
  input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:13px 15px;color:var(--text);font-family:var(--body);font-size:15px;margin-bottom:16px;transition:.2s}
  input:focus{outline:none;border-color:var(--gold)}
  .btn{width:100%;background:var(--gold);color:var(--ink);font-family:var(--body);font-weight:600;font-size:15.5px;padding:14px;border:none;border-radius:10px;cursor:pointer;transition:.2s;margin-top:10px}
  .btn:hover{background:var(--gold-2)}
  .msg{font-size:13.5px;padding:12px 14px;border-radius:9px;margin-top:16px;display:none;line-height:1.5;text-align:center}
  .msg.err{display:block;background:rgba(224,108,108,.12);border:1px solid rgba(224,108,108,.3);color:#f0a0a0}
  .msg.ok{display:block;background:rgba(79,209,168,.12);border:1px solid rgba(79,209,168,.3);color:#7fe0c4}
</style>
</head>
<body>

<div class="card">
  <h1>⚙️ Panel Operativo</h1>
  <p class="sub">Ajuste manual de fondos de práctica</p>
  
  <label>Correo del usuario</label>
  <input type="email" id="email" placeholder="cliente@ejemplo.com">
  
  <label>Nuevo saldo total ($)</label>
  <input type="number" id="saldo" placeholder="Ej. 150000">
  
  <button class="btn" id="btn">Actualizar Saldo</button>
  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  
  function show(t, type){
    msg.textContent = t;
    msg.className = 'msg ' + type;
  }

  btn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const saldo = document.getElementById('saldo').value.trim();

    if(!email || !saldo){
      show('Ingresa el correo y el nuevo saldo.', 'err');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Actualizando...';

    // Guardamos el saldo directamente buscando por el correo electrónico
    const { data, error } = await sb
      .from('perfiles')
      .insert([{ email: email, balance: parseFloat(saldo) }], { upsert: true })
      .select();

    // Nota: Usamos una estrategia que crea o actualiza si ya existe el correo
    const { error: updateError } = await sb
      .from('perfiles')
      .update({ balance: parseFloat(saldo) })
      .eq('email', email);

    if (updateError) {
      show('Error al guardar en la base de datos.', 'err');
    } else {
      show('✅ Saldo actualizado correctamente a $' + parseFloat(saldo).toLocaleString('es-MX'), 'ok');
      document.getElementById('email').value = '';
      document.getElementById('saldo').value = '';
    }
    
    btn.disabled = false;
    btn.textContent = 'Actualizar Saldo';
  });
</script>
</body>
</html>
